<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORGANIKhoda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <section id="page-1" class="view">
        <header>
            <h1 class="brand">ORGANIKhoda</h1>
        </header>
        <div class="menu-container">
            <button class="btn btn-primary" onclick="navigateTo('page-2-1')">Agregar actividad / curso</button>
            <button class="btn btn-danger" onclick="navigateTo('page-2-2')">Quitar actividad / curso</button>
            <button class="btn btn-outline" onclick="renderActivities()">Ver mis actividades</button>
        </div>
    </section>

    <section id="page-2-1" class="view hidden">
        <div class="container">
            <h2>Nombre</h2>
            <input type="text" id="input-activity-name" placeholder="Ej: Programación Java">
            <button class="btn btn-success" onclick="handleAddActivity()">Guardar</button>
            <button class="btn btn-back" onclick="navigateTo('page-1')">Regresar</button>
        </div>
    </section>

    <section id="page-3" class="view hidden">
        <div class="container">
            <h2>Actividades</h2>
            <div id="activities-list" class="cards-grid"></div>
            <button class="btn btn-back" onclick="navigateTo('page-1')">Regresar</button>
        </div>
    </section>

    <section id="page-4" class="view hidden">
        <div class="container">
            <h2 id="detail-title">Actividad</h2>
            <div id="tasks-list" class="tasks-container"></div>
            <div id="add-task-trigger"></div>
            <button class="btn btn-back" onclick="navigateTo('page-3')">Regresar</button>
        </div>
    </section>

    <section id="page-5" class="view hidden">
        <div class="container">
            <h2>Tarea:</h2>
            <input type="text" id="input-task-name" placeholder="¿Qué hay que hacer?">
            <button class="btn btn-success" onclick="handleAddTask()">Agregar</button>
            <button class="btn btn-back" onclick="navigateTo('page-4')">Regresar</button>
        </div>
    </section>

    <section id="page-2-2" class="view hidden">
        <div class="container">
            <h2>Seleccione para eliminar</h2>
            <div id="delete-list" class="cards-grid"></div>
            <button class="btn btn-back" onclick="navigateTo('page-1')">Regresar</button>
        </div>
    </section>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
